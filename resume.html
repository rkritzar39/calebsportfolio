<script>
  document.addEventListener("DOMContentLoaded", () => {
    const dock = document.querySelector(".onyx-dock");
    const links = Array.from(
      document.querySelectorAll(".onyx-dock .dock-item")
    );
    const lens = dock?.querySelector(".dock-active-lens");

    if (!dock || !links.length || !lens) return;

    let resizeFrame = null;

    /* ======================================================= */
    /* Path Normalization                                      */
    /* ======================================================= */

    function normalizePath(path) {
      let clean = String(path || "/")
        .split("?")[0]
        .split("#")[0]
        .toLowerCase()
        .replace(/\/index\.html$/i, "")
        .replace(/\.html$/i, "")
        .replace(/\/+$/g, "");

      if (!clean || clean === "/home") {
        clean = "/";
      }

      if (!clean.startsWith("/")) {
        clean = `/${clean}`;
      }

      return clean;
    }

    /* ======================================================= */
    /* Active Route Detection                                  */
    /* ======================================================= */

    function findActiveLink() {
      const currentPath = normalizePath(
        window.location.pathname
      );

      let exactMatch = null;
      let nestedMatch = null;

      links.forEach((link) => {
        const href =
          link.getAttribute("href") || "/";

        const targetPath = normalizePath(
          new URL(
            href,
            window.location.origin
          ).pathname
        );

        if (currentPath === targetPath) {
          exactMatch = link;
        } else if (
          targetPath !== "/" &&
          currentPath.startsWith(`${targetPath}/`)
        ) {
          nestedMatch = link;
        }
      });

      return exactMatch || nestedMatch || links[0];
    }

    /* ======================================================= */
    /* Active Lens Position                                    */
    /* ======================================================= */

    function moveLensTo(link) {
      if (!link) return;

      const dockRect =
        dock.getBoundingClientRect();

      const linkRect =
        link.getBoundingClientRect();

      const x =
        linkRect.left - dockRect.left;

      dock.style.setProperty(
        "--lens-x",
        `${x}px`
      );

      dock.style.setProperty(
        "--lens-width",
        `${linkRect.width}px`
      );
    }

    /* ======================================================= */
    /* Active Tab Update                                       */
    /* ======================================================= */

    function updateActiveTab() {
      const activeLink = findActiveLink();

      links.forEach((link) => {
        const isActive =
          link === activeLink;

        link.classList.toggle(
          "active",
          isActive
        );

        if (isActive) {
          link.setAttribute(
            "aria-current",
            "page"
          );
        } else {
          link.removeAttribute(
            "aria-current"
          );
        }
      });

      moveLensTo(activeLink);

      requestAnimationFrame(() => {
        dock.classList.add("dock-ready");
      });
    }

    /* ======================================================= */
    /* Initialize Dock                                         */
    /* ======================================================= */

    requestAnimationFrame(() => {
      requestAnimationFrame(
        updateActiveTab
      );
    });

    /* ======================================================= */
    /* Responsive Lens Updates                                 */
    /* ======================================================= */

    window.addEventListener(
      "resize",
      () => {
        if (resizeFrame !== null) {
          cancelAnimationFrame(
            resizeFrame
          );
        }

        resizeFrame = requestAnimationFrame(
          () => {
            const activeLink =
              dock.querySelector(
                ".dock-item.active"
              );

            moveLensTo(activeLink);
            resizeFrame = null;
          }
        );
      },
      { passive: true }
    );

    window.addEventListener(
      "pageshow",
      updateActiveTab
    );

    window.addEventListener(
      "popstate",
      updateActiveTab
    );

    /* ======================================================= */
    /* Current Year                                            */
    /* ======================================================= */

    const year =
      document.getElementById("year");

    if (year) {
      year.textContent =
        new Date().getFullYear();
    }
  });
</script>
