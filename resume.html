<script>
function normalizeOnyxDockPath(path) {
  let clean = String(path || "/")
    .split("?")[0]
    .split("#")[0]
    .toLowerCase()
    .replace(/\/index\.html$/i, "/")
    .replace(/\.html$/i, "")
    .replace(/\/+$/g, "");

  if (!clean) clean = "/";
  if (clean === "/home") clean = "/";

  return clean;
}

function updateOnyxDockActiveTab() {
  const dock = document.querySelector(".onyx-dock");
  const links = [...document.querySelectorAll(".onyx-dock .dock-item")];

  if (!dock || !links.length) return;

  const currentPath = normalizeOnyxDockPath(window.location.pathname);

  let activeLink = links.find((link) => {
    const targetPath = normalizeOnyxDockPath(
      new URL(link.href, window.location.origin).pathname
    );

    return targetPath === "/"
      ? currentPath === "/"
      : currentPath === targetPath ||
          currentPath.startsWith(targetPath + "/");
  });

  if (!activeLink) {
    activeLink =
      document.querySelector('.onyx-dock .dock-item[href="/"]') || links[0];
  }

  links.forEach((link) => {
    const active = link === activeLink;

    link.classList.toggle("active", active);

    if (active) {
      link.setAttribute("aria-current", "page");
    } else {
      link.removeAttribute("aria-current");
    }
  });

  dock.classList.add("dock-ready");
}

function setupOnyxDockEffects() {
  document.querySelectorAll(".onyx-dock .dock-item").forEach((link) => {
    if (link.dataset.dockEffectsReady) return;

    link.dataset.dockEffectsReady = "true";

    link.addEventListener("mousemove", (e) => {
      const rect = link.getBoundingClientRect();

      const x = e.clientX - rect.left;
      const y = e.clientY - rect.top;

      const dx = x / rect.width - 0.5;
      const dy = y / rect.height - 0.5;

      link.style.setProperty("--x", `${x}px`);
      link.style.setProperty("--y", `${y}px`);
      link.style.setProperty("--dx", dx.toFixed(3));
      link.style.setProperty("--dy", dy.toFixed(3));
    });

    link.addEventListener("mouseleave", () => {
      link.style.setProperty("--dx", "0");
      link.style.setProperty("--dy", "0");
    });
  });
}

function initOnyxDock() {
  setupOnyxDockEffects();
  updateOnyxDockActiveTab();

  requestAnimationFrame(updateOnyxDockActiveTab);
  setTimeout(updateOnyxDockActiveTab, 50);
  setTimeout(updateOnyxDockActiveTab, 150);
  setTimeout(updateOnyxDockActiveTab, 350);
  setTimeout(updateOnyxDockActiveTab, 800);

  const year = document.getElementById("year");
  if (year) {
    year.textContent = new Date().getFullYear();
  }
}

if (document.readyState === "loading") {
  document.addEventListener("DOMContentLoaded", initOnyxDock);
} else {
  initOnyxDock();
}

window.addEventListener("pageshow", () => {
  setupOnyxDockEffects();
  updateOnyxDockActiveTab();
  requestAnimationFrame(updateOnyxDockActiveTab);
  setTimeout(updateOnyxDockActiveTab, 100);
  setTimeout(updateOnyxDockActiveTab, 400);
});

window.addEventListener("load", updateOnyxDockActiveTab);
window.addEventListener("resize", updateOnyxDockActiveTab);
window.addEventListener("popstate", updateOnyxDockActiveTab);
window.addEventListener("hashchange", updateOnyxDockActiveTab);
</script>
