<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Caleb Kritzar - Resume</title>

  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="settings.css" />
  <link rel="stylesheet" href="resume.css" />
</head>
<body>
  <div id="resume-print-area">
    <header class="site-header">
      <div class="header-inner">
        <img src="IMG_7115.png" alt="Caleb Kritzar" class="header-photo" />

        <div class="header-text">
          <h1 id="name"></h1>
          <p class="professional-title" id="professional-title"></p>

          <div class="contact-line contact-items">
            <span id="location"></span>
            <a id="phone"></a>
            <a id="email"></a>
            <a id="website" target="_blank" rel="noopener noreferrer"></a>
            <a id="linkedin" target="_blank" rel="noopener noreferrer"></a>
          </div>
        </div>
      </div>
    </header>

    <div class="resume-container">
      <main class="resume-content">
        <section>
          <h2>Summary</h2>
          <p id="summary"></p>
        </section>

        <section>
          <h2>Skills</h2>
          <div class="skills-list" id="skills-list"></div>
        </section>

        <section>
          <h2>Languages</h2>
          <div class="languages-list" id="languages-list"></div>
        </section>

        <section>
          <h2>Experience</h2>
          <div id="experience-list"></div>
        </section>

        <section>
          <h2>Education</h2>
          <div id="education-list"></div>
        </section>

        <section>
          <h2>Certifications</h2>
          <ul id="certifications-list"></ul>
        </section>

        <section>
          <h2>Projects</h2>
          <ul id="projects-list"></ul>
        </section>

        <button id="download-btn" class="download-btn">
          Download Resume PDF
        </button>
      </main>
    </div>
  </div>

  <footer class="no-rearrange">
    <p>© <span id="year"></span> Caleb Kritzar. All Rights Reserved.</p>
  </footer>

  <!-- Dock -->
  <nav class="onyx-dock">
    <a href="index.html" class="dock-item">
      <svg class="dock-icon" viewBox="0 0 24 24">
        <path d="M3 10.5L12 3l9 7.5v9a1.5 1.5 0 0 1-1.5 1.5h-15A1.5 1.5 0 0 1 3 19.5v-9Z" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M9 21v-6h6v6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <span class="dock-label">Home</span>
    </a>

    <a href="resume.html" class="dock-item">
      <svg class="dock-icon" viewBox="0 0 24 24">
        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M14 2v6h6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M16 13H8" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M16 17H8" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M10 9H8" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <span class="dock-label">Resume</span>
    </a>

    <a href="settings.html" class="dock-item">
      <svg class="dock-icon" viewBox="0 0 24 24">
        <circle cx="12" cy="12" r="3" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09a1.65 1.65 0 0 0 1.51-1 1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33h.09a1.65 1.65 0 0 0 1-1.51V4a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82v.09a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <span class="dock-label">Settings</span>
    </a>
  </nav>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const links = document.querySelectorAll('.onyx-dock .dock-item');

      let current = window.location.pathname.split("/").pop();
      if (current === "" || current === "/") current = "index.html";

      links.forEach(link => {
        const target = link.getAttribute("href");
        if (target === current) link.classList.add("active");

        link.addEventListener('mousemove', (e) => {
          const rect = link.getBoundingClientRect();
          const x = e.clientX - rect.left;
          const y = e.clientY - rect.top;
          const dx = (x / rect.width) - 0.5;
          const dy = (y / rect.height) - 0.5;
          link.style.setProperty('--x', `${x}px`);
          link.style.setProperty('--y', `${y}px`);
          link.style.setProperty('--dx', dx);
          link.style.setProperty('--dy', dy);
        });

        link.addEventListener('mouseleave', () => {
          link.style.setProperty('--dx', 0);
          link.style.setProperty('--dy', 0);
        });
      });

      const y = document.getElementById("year");
      if (y) y.textContent = new Date().getFullYear();
    });
  </script>
  <script src="https://unpkg.com/suncalc@1.9.0/suncalc.js"></script>
  <script src="settings.js"></script>
  <script src="script.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

  <script type="module" src="resume.js"></script>
</body>
</html>
