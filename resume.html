<body>

  <!-- HEADER (STATIC IDENTITY ONLY) -->

    <div class="header-inner">

      <div class="header-text">
        <h1 id="name"></h1>

        <div class="contact-line" id="contact"></div>

        <a class="email-link" id="email"></a>
      </div>
    </div>

  <div class="resume-container">

        <div class="languages-list" id="languages-list"></div>

        <h2>Experience</h2>
        <div id="experience-list"></div>
      </section>

        <div id="education-list"></div>
      </section>

      <!-- CERTIFICATIONS -->
      <section>
        <h2>Certifications</h2>
        <ul id="certifications-list"></ul>
      </section>

      <!-- PROJECTS -->
      <section>
        <h2>Projects</h2>
        <ul id="projects-list"></ul>
      </section>

      <!-- DOWNLOAD -->
      <button id="download-btn" class="download-btn">
        Download Resume PDF
      </button>

    </main>
  </div>

  <!-- FOOTER -->
  <footer class="no-rearrange">

  </footer>

  <!-- DOCK -->
