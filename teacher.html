<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Teacher Portal</title>

<!-- Shared LMS styling -->
<link rel="stylesheet" href="toledo.css">
</head>

<body>

<!-- =========================
     TOP BAR
========================= -->
<div class="topbar">
  Teacher Portal • LMS Control Panel
</div>

<!-- =========================
     APP LAYOUT
========================= -->
<div class="app">

  <!-- =========================
       SIDEBAR (OPTIONAL CONSISTENCY)
  ========================== -->
  <div class="sidebar">

    <div class="navItem">
      👨‍🏫 Teacher Dashboard
    </div>

    <div class="sectionLabel">
      📚 Courses
    </div>

    <div id="courseList"></div>

  </div>

  <!-- =========================
       MAIN CONTENT
  ========================== -->
  <div class="main">

    <!-- =========================
         CREATE COURSE
    ========================== -->
    <div class="card">
      <h2>📚 Create Course</h2>

      <input id="courseName" placeholder="Course name">
      <button onclick="addCourse()">Add Course</button>
    </div>

    <!-- =========================
         CREATE ASSIGNMENT (GRADEBOOK)
    ========================== -->
    <div class="card">
      <h2>📝 Create Assignment</h2>

      <input id="aTitle" placeholder="Assignment title">
      <input id="aDue" type="date">

      <select id="aCourse"></select>

      <input id="aScore" type="number" placeholder="Score (0–100)">

      <button onclick="addAssignment()">Create Assignment</button>
    </div>

    <!-- =========================
         PUBLISHED COURSES
    ========================== -->
    <div class="card">
      <h3>📚 Published Courses</h3>

      <div id="courseList"></div>
    </div>

    <!-- =========================
         PUBLISHED ASSIGNMENTS
    ========================== -->
    <div class="card">
      <h3>📝 Published Assignments</h3>

      <div id="assignmentList"></div>
    </div>

  </div>

</div>

<!-- =========================
     TEACHER LOGIC
========================= -->
<script src="teacher.js"></script>

</body>
</html>
