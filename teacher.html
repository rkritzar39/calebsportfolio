<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Teacher Portal</title>

<!-- SAME CSS AS STUDENT -->
<link rel="stylesheet" href="toledo.css">
</head>

<body>

<div class="topbar">
  Teacher Portal • Content Manager
</div>

<div class="main">

  <div class="card">
    <h2>📊 Instructor Dashboard</h2>
    <p>
      This is the publishing control panel. All updates here appear in the student portal instantly.
    </p>
  </div>

  <!-- SYSTEM CONTROLS -->
  <div class="card">
    <h3>⚙️ Controls</h3>
    <button onclick="resetDemo()">Reset System</button>
    <button onclick="publish()">Publish Updates</button>
  </div>

  <!-- CREATE COURSE -->
  <div class="card">
    <h3>📚 Create Course</h3>

    <input id="courseName" placeholder="Course name">
    <button onclick="addCourse()">Add Course</button>
  </div>

  <!-- CREATE ASSIGNMENT -->
  <div class="card">
    <h3>📝 Create Assignment</h3>

    <input id="aTitle" placeholder="Assignment title">
    <input id="aDue" type="date">

    <select id="aCourse"></select>

    <button onclick="addAssignment()">Create Assignment</button>
  </div>

  <!-- LIVE DATA VIEW -->
  <div class="card">
    <h3>📦 Published Content</h3>

    <h4>Courses</h4>
    <div id="courseList"></div>

    <h4 style="margin-top:10px;">Assignments</h4>
    <div id="assignmentList"></div>
  </div>

</div>

<script src="teacher.js"></script>

</body>
</html>
