<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Student Portal</title>

<!-- Shared LMS styling -->
<link rel="stylesheet" href="toledo.css">
</head>

<body>

<!-- =========================
     TOP BAR
========================= -->
<div class="topbar">
  Student Portal • Academic Dashboard
</div>

<!-- =========================
     APP LAYOUT
========================= -->
<div class="app">

  <!-- =========================
       SIDEBAR NAVIGATION
  ========================== -->
  <div class="sidebar">

    <!-- Dashboard -->
    <div class="navItem" onclick="showDashboard()">
      🏠 Dashboard
    </div>

    <!-- Courses Label -->
    <div class="navItem">
      📚 Courses
    </div>

    <!-- Dynamic course list injected by JS -->
    <div id="courseList"></div>

    <!-- Reset System -->
    <div class="navItem" onclick="resetDemo()">
      ♻ Reset System
    </div>

  </div>

  <!-- =========================
       MAIN CONTENT PANEL
  ========================== -->
  <div class="main">

    <!-- Dynamic content renders here -->
    <div id="view"></div>

  </div>

</div>

<!-- =========================
     STUDENT LOGIC
========================= -->
<script src="toledo.js"></script>

</body>
</html>
