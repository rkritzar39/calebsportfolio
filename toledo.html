<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Student Portal</title>

<link rel="stylesheet" href="toledo.css">
</head>

<body>

<!-- =========================
     TOP BAR
========================= -->
<div class="topbar">
  Student Portal • Academic Dashboard
</div>

<!-- =========================
     APP WRAPPER
========================= -->
<div class="app">

  <!-- =========================
       SIDEBAR NAVIGATION
  ========================== -->
  <div class="sidebar">

    <!-- MAIN NAV -->
    <div class="navItem" onclick="showDashboard()">
      🏠 Dashboard
    </div>

    <div class="sectionLabel">
      📚 Courses
    </div>

    <!-- Dynamic course list -->
    <div id="courseList"></div>

    <!-- SYSTEM ACTIONS -->
    <div class="navItem" onclick="resetDemo()">
      ♻ Reset System
    </div>

  </div>

  <!-- =========================
       MAIN CONTENT
  ========================== -->
  <div class="main">

    <!-- Optional fallback UI -->
    <div id="view">
      <div class="card">
        Loading student portal...
      </div>
    </div>

  </div>

</div>

<!-- =========================
     STUDENT LOGIC
========================= -->
<script src="toledo.js"></script>

</body>
</html>
