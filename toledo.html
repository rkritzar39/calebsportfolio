<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Student Portal</title>

<!-- Shared student styling -->
<link rel="stylesheet" href="toledo.css">
</head>

<body>

<!-- TOP BAR -->
<div class="topbar">
  Student Portal • View Only Mode
</div>

<!-- MAIN LAYOUT -->
<div class="main">

  <!-- SYSTEM HEADER -->
  <div class="card">
    <h2>📘 Academic Feed</h2>
    <p>
      This page displays instructor-published coursework, assignments, and updates.
      Content is read-only.
    </p>
  </div>

  <!-- DASHBOARD SUMMARY -->
  <div id="dashboard" class="card"></div>

  <!-- COURSES SECTION -->
  <div class="card">
    <h3>📚 Courses</h3>
    <div class="courseGrid"></div>
  </div>

  <!-- ASSIGNMENTS SECTION -->
  <div class="card">
    <h3>📝 Assignments</h3>
    <div id="assignmentList"></div>
  </div>

  <!-- CALENDAR SECTION -->
  <div class="card">
    <h3>📅 Calendar</h3>
    <div class="calendarGrid"></div>
  </div>

  <!-- FOOTER INFO -->
  <div class="card">
    <p style="opacity:0.7">
      Live updates appear automatically when the instructor publishes new content.
    </p>
  </div>

</div>

<!-- STUDENT LOGIC -->
<script src="toledo.js"></script>

</body>
</html>
