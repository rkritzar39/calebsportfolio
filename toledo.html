<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Portal</title>

<link rel="stylesheet" href="toledo.css">
</head>

<body>

<div class="topbar">Student Portal</div>

<div class="container">

  <div class="sidebar">
    <div onclick="show('dashboard')">Dashboard</div>
    <div onclick="show('courses')">Courses</div>
    <div onclick="show('assignments')">Assignments</div>
    <div onclick="show('calendar')">Calendar</div>
  </div>

  <div class="main">

    <div id="dashboard" class="page active"></div>

    <div id="courses" class="page">
      <div class="courseGrid"></div>
    </div>

    <div id="assignments" class="page">
      <div id="assignmentList" class="card"></div>
    </div>

    <div id="calendar" class="page">
      <div class="calendarGrid card"></div>
    </div>

  </div>

</div>

<script src="schoology.js"></script>

</body>
</html>
